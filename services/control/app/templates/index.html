<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Django SPA Layout</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    {% load static %}

    <link rel="stylesheet" href="{% static 'app/style.css' %}">
</head>

<body>

<div id="layout">

<!-- LEFT -->
<div id="content"></div>

<!-- RIGHT -->
<div id="sidebar">

<div id="nav" style="display: flex; align-items: center; justify-content: space-between;">
    <h2>Local-AI</h2>

    <!-- 認證 & modal 按鈕 -->
    <div style="display: flex; align-items: center; gap: 10px;">
        <span id="authStatus" style="font-size: 14px; color: red;">未認證</span>

        <button class="icon-btn" onclick="openLicenseDialog()">
            <i class="material-icons">settings</i>
            <span class="tooltip-text">管理認證</span>
        </button>
    </div>
</div>

<div id="log-panel">

<div id="log-header">
<span>訊息顯示</span>
<button id="gpuButton" class="icon-btn">
    <i class="material-icons">developer_board</i>
    <span class="tooltip-text">GPU用量</span>
</button>
</div>

<div id="log-content">
<p>系統尚未啟動</p>
</div>

</div>

</div>

</div>

<div id="modelDialog" class="modal" style="display: none;">
<div class="modal-content">
<span class="close-btn" onclick="closeModelDialog()">&times;</span>
<h3>管理模型</h3>
<div style="display: flex; gap: 10px;">
<input style="flex: 1;" type="text" id="modelInput" placeholder="輸入模型名稱">
<button class="icon-btn" onclick="addModel()">
<i class="material-icons">download</i>
<span class="tooltip-text">下載</span>
</button>
</div>
<ul id="modelList"></ul>
<div class="pagination">
<button id="prevBtn" class="icon-btn">
<i class="material-icons">chevron_left</i>
<span class="tooltip-text">上一頁</span>
</button>
<button id="nextBtn" class="icon-btn">
<i class="material-icons">chevron_right</i>
<span class="tooltip-text">下一頁</span>
</button>
</div>
</div>
</div>



<div id="licenseDialog" class="modal" style="display: none;">
    <div class="modal-content">
        <span class="close-btn" onclick="closeLicenseDialog()">&times;</span>
        <h3>管理認證</h3>

        <!-- 上傳 input + 按鈕 -->
        <div class="license-upload" style="flex-direction: column; display: flex; gap: 10px;">
            <div class="license-upload-box" id="licenseDropZone">
                <input type="file" id="licenseInput" accept=".key">
                <div class="upload-content">
                    <p id="licenseText">拖曳 license.key 到這裡<br>或點擊選擇檔案</p>
                </div>
            </div>

            <button class="icon-btn" style="margin-bottom: 0px;" onclick="addLicense()">
                <i class="material-icons">upload</i>
                <span class="tooltip-text">上傳</span>
            </button>
        </div>

        <!-- 認證資訊 -->
        <div id="authInfo" style="font-size: 14px; color: #333; margin-bottom: 10px;">
            <p class="status-row"><strong>使用者:</strong> <span id="authUser">未取得</span></p>
            <p class="status-row"><strong>開始時間:</strong> <span id="authStart">未取得</span></p>
            <p class="status-row"><strong>到期時間:</strong> <span id="authExpire">未取得</span></p>
            <p class="status-row"><strong>功能:</strong> <span id="authFeatures">未取得</span></p>
        </div>
    </div>
</div>

<script>

/* ---------------- LOG ---------------- */

function addLog(msg){

const log=document.getElementById("log-content");

const p=document.createElement("p");
p.textContent=msg;

log.appendChild(p);
log.scrollTop=log.scrollHeight;

}

document.addEventListener("DOMContentLoaded", () => {
    renderComposePage();
});

/* ---------------- GPU ---------------- */

document.getElementById("gpuButton").onclick = async () => {

    const res = await fetch("/api/gpu/");
    const data = await res.json();

    if(data.error){
        addLog("GPU讀取失敗");
        return;
    }

    addLog("GPU記憶體：" + data.memory_used + "GB / " + data.memory_total + "GB" + " ("+ data.memory_percent +"%)");

};

/* ---------------- STATE ---------------- */

const composeState = {{ compose_state|safe }};

/* ---------------- COMPOSE PAGE ---------------- */

function renderComposePage(){

    const content=document.getElementById("content");

    const running = Object.values(composeState).some(s => s.running);

    content.innerHTML=`
    
    <div class="compose-card">

    <div class="compose-title">

    <h2>Compose</h2>

    <button class="icon-btn" onclick="toggleCompose()">
        <i class="material-icons">${running ? "stop" : "power_settings_new"}</i>
        <span class="tooltip-text">${running ? "停止Compose" : "開啟Compose"}</span>
    </button>

    </div>

    <div class="compose-content">

    <div class="compose-grid">

    ${renderServiceCard("Chat")}
    ${renderServiceCard("Embedding")}
    ${renderServiceCard("STT")}
    ${renderServiceCard("TTS")}

    </div>

    </div>

    </div>

    `;

}

async function toggleCompose() {

    const running = Object.values(composeState).some(s => s.running);
    const servicesToToggle = Object.keys(composeState).filter(s => composeState[s].exists);
    if (servicesToToggle.length === 0) {
        addLog("沒有已啟用的服務可以操作");
        return;
    }

    const servicesStr = servicesToToggle.map(s => s.toLowerCase()).join(" ");
    const api = running
        ? `/api/docker/down/?service=${servicesStr}`
        : `/api/docker/up/?service=${servicesStr}`;

    addLog(`正在 ${running ? "停止" : "啟動"} Compose...`);

    try {
        const resDocker = await fetch(api);
        const dataDocker = await resDocker.json();
        
        if (!dataDocker.results || !Array.isArray(dataDocker.results)) {
            addLog("Docker API 回傳格式錯誤: " + JSON.stringify(dataDocker));
            return;
        }

        for (let r of dataDocker.results) {
            let service = r.service.length === 3
                ? r.service.toUpperCase()
                : r.service.charAt(0).toUpperCase() + r.service.slice(1);
            const prevState = composeState[service].running;

            if (r.success) {
                composeState[service].exists = !running;
                composeState[service].running = !running;
            } else {
                addLog(`Docker Error (${service}): ${r.error}`);
                continue; 
            }

            try {
                const resState = await fetch("/api/compose_state/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ service, exists: composeState[service].exists, running: composeState[service].running }),
                });
                const dataState = await resState.json();

                if (dataState.success) {
                    addLog(`${service} 已 ${composeState[service].running ? "啟動" : "停止"}`);
                } else {
                    addLog(`同步失敗 (${service}): ${dataState.error}`);
                    composeState[service].exists = prevState; 
                    composeState[service].running = prevState;
                }
            } catch (err) {
                addLog(`Fetch Error (${service}): ${err}`);
                composeState[service].exists = prevState; 
                composeState[service].running = prevState;
            }
        }

        renderComposePage();

    } catch (err) {
        addLog("Fetch Error: " + err);
    }
}

/* ---------------- SERVICE CARD ----------------*/
function renderServiceCard(name) {
  const s = composeState[name];

  return `
    <div class="service-card">
      <!-- Header: 標題 + toggle + 按鈕 -->
      <div class="service-card-header">
        <h3>${name}</h3>
        <label class="switch">
          <input id="chk-${name.toLowerCase()}" type="checkbox" ${s.exists ? "checked" : ""} onchange="updateServiceState('${name}', this.checked)">
          <span class="slider"></span>
          <span class="tooltip-text">啟用/停用${name}</span>
        </label>
      </div>

      <!-- Body: 狀態、模型、GPU -->
      <div class="service-card-body">
        <div class="status-row">
          <span class="label">狀態：</span>
          <span class="value">${s.running ? "運行中" : "未啟動"}</span>
          <button class="icon-btn" onclick="restartService('${name}')">
            <i class="material-icons">refresh</i>
            <span class="tooltip-text">重啟${name}服務</span>
          </button>
        </div>

        <div class="status-row">
          <span class="label">模型：</span>
          <span id="${name.toLowerCase()}-model-name"class="value">${s.model.use}</span>
          <button class="icon-btn" onclick="openModelDialog('${name}')">
            <i class="material-icons">edit</i>
            <span class="tooltip-text">設定${name}模型</span>
          </button>
        </div>

        <div class="status-row">
          <span class="label">GPU：</span>
          <span class="value" id="gpu-${name.toLowerCase()}">-GB / -GB (-%)</span>
          <!--
          <button class="icon-btn">
            <i class="material-icons">edit</i>
            <span class="tooltip-text">設定${name}GPU</span>
          </button>
          -->
        </div>
      </div>
    </div>
  `;
}

function updateAllGPU() {
    const servicesToCheck = Object.keys(composeState).filter(s => composeState[s].exists);
    if (servicesToCheck.length === 0) return;

    fetch("/api/container_gpu_stats/")
        .then(res => res.json())
        .then(data => {
            if (!data.success) {
                console.error("GPU API error:", data.error);
                return;
            }

            servicesToCheck.forEach(service => {
                const info = data.data[service];
                const span = document.getElementById(`gpu-${service.toLowerCase()}`);
                if (!span) return;

                if (!info || info.error) {
                    span.textContent = "-GB / -GB (-%)";
                } else {
                    span.textContent = info;
                }
            });
        })
        .catch(err => console.error(err));
}

setInterval(updateAllGPU, 1000);

function checkServiceStatus() {

    fetch("/api/container_status/")
        .then(res => res.json())
        .then(data => {
            if (!data.success) {
                console.error("Status API Error:", data.error);
                return;
            }

            Object.entries(data.data).forEach(([service, info]) => {
                composeState[service].running = info.running;
            });
        })
        .catch(err => console.error(err));
}

setInterval(checkServiceStatus(), 30000);

async function restartService(service) {
    
    if (!composeState[service] || !composeState[service].running) {
        addLog(`${service} 不存在或未啟用，無法重啟`);
        return;
    }

    addLog(`正在重啟 ${service} 服務...`);

    try {
        const res = await fetch(`/api/restart/service/?service=${service}`);
        const data = await res.json();

        if (data.success) {
            addLog(data.message);
        } else {
            addLog(`重啟失敗: ${data.error}`);
        }
    } catch (err) {
        addLog(`Fetch Error: ${err}`);
    }
}

/* ---------------- MODEL CHANGE ---------------- */

async function updateServiceState(service, checked) {
    const checkbox = document.getElementById(`chk-${service.toLowerCase()}`);

    const prevState = composeState[service].exists;

    checkbox.disabled = true;

    composeState[service].exists = checked;
    composeState[service].running = checked;
    let error = false;

    const api = checked
        ? `/api/docker/up/?service=${service.toLowerCase()}`
        : `/api/docker/down/?service=${service.toLowerCase()}`;

    try {
        const resDocker = await fetch(api);
        const dataDocker = await resDocker.json();

        if (dataDocker.results && Array.isArray(dataDocker.results)) {
            dataDocker.results.forEach(r => {
                if (r.success) ;//addLog(JSON.stringify(r));
                else addLog(`Docker Error (${r.service}): ${r.error}`);
            });
            error = dataDocker.results.some(r => !r.success);
        } else {
            addLog("Docker API 回傳格式錯誤: " + JSON.stringify(dataDocker));
            error = true;
        }

        renderComposePage();
    } catch (err) {
        addLog("Fetch Error: " + err);
        composeState[service].exists = prevState;
        error = true;
        renderComposePage();
    }

    if (!error) {
        try {
            const resState = await fetch("/api/compose_state/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ service, exists: checked, running: checked }),
            });
            const dataState = await resState.json();

            if (dataState.success) addLog(`${service} 已 ${checked ? "啟用" : "停用"}`);
            else {
                addLog(`同步失敗: ${dataState.error}`);
                composeState[service].exists = prevState;
                composeState[service].running = prevState;
            }
        } catch (err) {
            addLog(`Fetch Error: ${err}`);
            composeState[service].exists = prevState;
            composeState[service].running = prevState;
        }
    }

    checkbox.disabled = false;
}

function updateModelState(service, model) {
    composeState[service].model = model;
    addLog(`${service} 模型切換為 ${model}`);

    fetch("/api/compose_state/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            service: service,
            model: model
        }),
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) addLog(`${service} 模型同步成功`);
        else addLog(`同步失敗: ${data.error}`);
    })
    .catch(err => addLog(`Fetch Error: ${err}`));
}





let currentService = "";
let currentModel = ""
let models = [];
let page = 0;
const pageSize = 5;

function openModelDialog(service) {
    currentService = service;
    page = 0;
    document.getElementById("modelDialog").style.display = "flex";
    fetchModels();
}

function closeModelDialog() {
    document.getElementById("modelDialog").style.display = "none";
}

// 避免點擊背景自動關閉
document.getElementById("modelDialog").addEventListener("click", (e) => {
    if (e.target === document.getElementById("modelDialog")) {
        // 什麼都不做，點擊背景不關閉
    }
});

function fetchModels() {
    fetch(`/api/models/get/?service=${currentService}`)
        .then(res => res.json())
        .then(data => {
            models = data.list;
            currentModel = data.use;
            renderList();
        });
}

function renderList() {
    const ul = document.getElementById("modelList");
    ul.innerHTML = ""; // 清空列表

    const start = page * pageSize;
    const end = start + pageSize;
    const pageModels = models.slice(start, end);

    pageModels.forEach(model => {
        // 判斷是否為當前使用模型
        const isCurrent = model === currentModel;
        const selectColor = isCurrent ? "#4CAF50" : "#ccc";
        const selectTextColor = isCurrent ? "#fff" : "#333";

        // 使用 template literal 建立 HTML
        ul.innerHTML += `
            <li style="display: flex; align-items: center; margin-bottom: 6px;">
                <span style="flex: 1;">${model}</span>
                <span style="display: flex; align-items: center; gap: 10px;">
                <button 
                    class="select-model-btn"
                    style="
                        margin-bottom: 0px;
                        border-radius: 6px;
                        border: none;
                        cursor: pointer;
                        font-size: 12px;
                        background-color: ${selectColor};
                        color: ${selectTextColor};
                    "
                    onclick="selectModel('${model}')"
                >使用</button>
                <button
                    class="delete-model-btn"
                    style="
                        margin-bottom: 0px;
                        border-radius: 6px;
                        border: none;
                        cursor: pointer;
                        font-size: 12px;
                        background-color: #f44336;
                        color: #fff;
                    "
                    onclick="deleteModel('${model}')"
                >刪除</button>
                <span>
            </li>
        `;
    });
}

// 將原本 inline onclick 的 fetch 邏輯抽出
function selectModel(model) {
    fetch("/api/models/select/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ service: currentService, model_name: model })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            currentModel = model; 

            const spanId = `${currentService.toLowerCase()}-model-name`;
            const spanEl = document.getElementById(spanId);
            if (spanEl) {
                spanEl.textContent = model;
            }
            renderList();
            addLog(data.message);
        } else {
            addLog(`錯誤: ${data.error}`);
        }
    });
}

document.getElementById("prevBtn").onclick = () => {
    if (page > 0) page--;
    renderList();
};

document.getElementById("nextBtn").onclick = () => {
    if ((page + 1) * pageSize < models.length) page++;
    renderList();
};

function addModel() {
    const modelName = document.getElementById("modelInput").value.trim();
    if (!modelName) return alert("請輸入模型名稱");

    fetch("/api/models/download/", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({service: currentService, model_name: modelName})
    })
    .then(res => res.json())
    .then(data => {
        models = data.list;
        renderList();
        alert(data.message);
    });
}

function deleteModel(modelName) {
    fetch("/api/models/delete/", {
        method: "DELETE",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({service: currentService, model_name: modelName})
    })
    .then(res => res.json())
    .then(data => {
        models = data.list;
        renderList();
        alert(data.message);
    });
}






const dropZone = document.getElementById("licenseDropZone");
const fileInput = document.getElementById("licenseInput");
const text = document.getElementById("licenseText");

// 點擊選檔
dropZone.addEventListener("click", () => {
    fileInput.click();
});

// 選擇檔案
fileInput.addEventListener("change", () => {
    updateFile(fileInput.files[0]);
});

// 拖曳事件
dropZone.addEventListener("dragover", e => {
    e.preventDefault();
    dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("dragover");

    const file = e.dataTransfer.files[0];
    if (!file) return;

    fileInput.files = e.dataTransfer.files;
    updateFile(file);
});

// 更新顯示
function updateFile(file) {

    if (!file.name.endsWith(".key")) {
        alert("請上傳 .key 檔案");
        return;
    }

    text.innerHTML = `
        <b>${file.name}</b><br>
        點擊重新選擇
    `;

    dropZone.classList.add("license-selected");
}

function openLicenseDialog() {
    document.getElementById("licenseDialog").style.display = "flex";
    fetchAuthInfo(); // 打開時更新認證資訊
}

function closeLicenseDialog() {
    document.getElementById("licenseDialog").style.display = "none";
}

fetchAuthInfo()

function addLicense() {
    const inputEl = document.getElementById("licenseInput");
    const file = inputEl.files[0];

    if (!file) return alert("請選擇 License 檔案 (.key)");

    if (!file.name.endsWith(".key")) {
        return alert("請上傳 .key 檔案");
    }

    const formData = new FormData();
    formData.append("file", file); // 要和 Django request.FILES.get("file") 一致

    fetch("/license/upload/", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        if (!data.success) {
            alert(`上傳失敗: ${data.error}`);
            return;
        }

        alert(`已上傳 License: ${file.name}`);
        inputEl.value = "";

        // 上傳成功後取得驗證資訊
        fetchAuthInfo();

    })
    .catch(err => {
        console.error(err);
        alert("上傳發生錯誤");
    });
}

function fetchAuthInfo() {

    fetch("/license/verify/")
    .then(res => res.json())
    .then(data => {
        console.log(data)
        if (!data.valid) {
            document.getElementById("authStatus").textContent = "未認證";
            document.getElementById("authStatus").style.color = "red";

            document.getElementById("authUser").textContent = "未取得";
            document.getElementById("authStart").textContent = "未取得";
            document.getElementById("authExpire").textContent = "未取得";
            document.getElementById("authFeatures").textContent = "未取得";
            return;
        }

        document.getElementById("authStatus").textContent = "已認證";
        document.getElementById("authStatus").style.color = "green";

        document.getElementById("authUser").textContent = data.user;
        document.getElementById("authStart").textContent = data.start;
        document.getElementById("authExpire").textContent = data.expire;
        document.getElementById("authFeatures").textContent = data.features.join(", ");

    })
    .catch(err => {

        document.getElementById("authStatus").textContent = "未認證";
        document.getElementById("authStatus").style.color = "red";

        document.getElementById("authUser").textContent = "未取得";
        document.getElementById("authStart").textContent = "未取得";
        document.getElementById("authExpire").textContent = "未取得";
        document.getElementById("authFeatures").textContent = "未取得";

        console.error(err);
    });
}
</script>

</body>
</html>
